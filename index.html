<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educa Pro | IFCE Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --ifce: #2f9e41; }
        .bg-ifce { background-color: var(--ifce); }
        .text-ifce { color: var(--ifce); }
        .active-tab { border-left: 4px solid var(--ifce); background: #f0fdf4; color: var(--ifce); }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col md:flex-row overflow-hidden">

    <aside class="w-full md:w-64 bg-white border-r border-gray-200 flex flex-col shadow-lg z-10">
        <div class="p-6 border-b text-center md:text-left">
            <h1 class="text-xl font-black">EDUCA <span class="text-ifce">PRO</span></h1>
            <div id="overall-progress" class="text-[10px] bg-gray-100 rounded-full mt-2 h-2 overflow-hidden">
                <div id="progress-bar" class="bg-ifce h-full" style="width: 0%"></div>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto flex md:block">
            <button onclick="renderTab('edital')" id="btn-edital" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-lg font-bold"><i class="fas fa-list-check"></i> Edital</button>
            <button onclick="renderTab('redacao')" id="btn-redacao" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-lg font-bold"><i class="fas fa-pen-fancy"></i> Redação</button>
            <button onclick="renderTab('calc')" id="btn-calc" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-lg font-bold"><i class="fas fa-calculator"></i> Notas</button>
            <button onclick="renderTab('macetes')" id="btn-macetes" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-lg font-bold"><i class="fas fa-bolt"></i> Macetes</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white p-4 border-b flex justify-between items-center shadow-sm">
            <span id="tab-title" class="font-black text-gray-600 uppercase tracking-widest">Dashboard</span>
            <div id="timer-display" class="hidden font-mono bg-red-100 text-red-600 px-3 py-1 rounded-lg font-bold animate-pulse">00:00</div>
        </header>
        
        <section id="app-viewport" class="p-4 md:p-8 max-w-4xl mx-auto w-full"></section>
    </main>

    <script>
        // Banco de Dados e Estado Local
        const EDITAL_DATA = [
            "Interpretação de Texto", "Acentuação e Ortografia", "Concordância Verbal",
            "Razão e Proporção", "Equações de 1º e 2º grau", "Geometria Básica"
        ];
        let progresso = JSON.parse(localStorage.getItem('progresso_ifce')) || {};
        let tempoRestante = 3600; // 60 minutos
        let interval;

        function save() { 
            localStorage.setItem('progresso_ifce', JSON.stringify(progresso));
            updateGlobalProgress();
        }

        function updateGlobalProgress() {
            const total = EDITAL_DATA.length;
            const concluido = Object.values(progresso).filter(v => v).length;
            document.getElementById('progress-bar').style.width = `${(concluido/total)*100}%`;
        }

        function renderTab(tab) {
            const v = document.getElementById('app-viewport');
            const title = document.getElementById('tab-title');
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`btn-${tab}`).classList.add('active-tab');
            title.innerText = tab;
            clearInterval(interval);
            document.getElementById('timer-display').classList.add('hidden');

            if(tab === 'edital') {
                v.innerHTML = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <h2 class="font-bold mb-4">Progresso do Edital Oficial</h2>
                        <div class="space-y-3">
                            ${EDITAL_DATA.map((item, i) => `
                                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg border">
                                    <input type="checkbox" onchange="progresso['${item}']=this.checked; save()" 
                                    ${progresso[item] ? 'checked' : ''} class="w-5 h-5 accent-green-600">
                                    <span class="text-sm font-semibold">${item}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }

            if(tab === 'redacao') {
                document.getElementById('timer-display').classList.remove('hidden');
                startTimer();
                v.innerHTML = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border text-center">
                        <h2 class="font-bold mb-2">Simulador de Redação IFCE</h2>
                        <p class="text-xs text-gray-400 mb-4 font-bold uppercase tracking-tighter">O tempo está correndo!</p>
                        <textarea class="w-full h-80 p-4 bg-gray-50 border rounded-xl focus:ring-2 ring-green-500 outline-none" placeholder="Escreva seu texto aqui..."></textarea>
                        <button class="w-full mt-4 bg-ifce text-white py-4 rounded-xl font-bold shadow-lg">FINALIZAR E ANALISAR</button>
                    </div>`;
            }

            if(tab === 'calc') {
                v.innerHTML = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <h2 class="font-bold mb-4">Simulador de Nota Final</h2>
                        <div class="space-y-4">
                            <div><label class="text-xs font-bold">ACERTOS PORTUGUÊS (PESO 2)</label>
                            <input id="p" type="number" class="w-full p-3 bg-gray-100 rounded-lg border focus:outline-ifce" placeholder="0 a 20"></div>
                            <div><label class="text-xs font-bold">ACERTOS MATEMÁTICA (PESO 3)</label>
                            <input id="m" type="number" class="w-full p-3 bg-gray-100 rounded-lg border focus:outline-ifce" placeholder="0 a 20"></div>
                            <button onclick="calc()" class="w-full bg-ifce text-white py-4 rounded-xl font-bold">CALCULAR MÉDIA</button>
                            <div id="res-calc" class="text-center font-black text-3xl text-ifce"></div>
                        </div>
                    </div>`;
            }

            if(tab === 'macetes') {
                v.innerHTML = `<div class="grid gap-4">
                    <div class="bg-gradient-to-br from-green-500 to-green-700 p-6 rounded-2xl text-white shadow-lg">
                        <span class="text-[10px] font-bold opacity-75">MACETE #01</span>
                        <h3 class="text-xl font-bold mt-1">Fórmula de Báskara</h3>
                        <p class="text-2xl mt-4 font-mono">Δ = b² - 4ac</p>
                    </div>
                </div>`;
            }
        }

        function startTimer() {
            interval = setInterval(() => {
                tempoRestante--;
                let min = Math.floor(tempoRestante / 60);
                let sec = tempoRestante % 60;
                document.getElementById('timer-display').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            }, 1000);
        }

        function calc() {
            const p = document.getElementById('p').value * 2;
            const m = document.getElementById('m').value * 3;
            document.getElementById('res-calc').innerText = ((p + m) / 5).toFixed(2);
        }

        window.onload = () => { renderTab('edital'); updateGlobalProgress(); };
    </script>
</body>
</html>
