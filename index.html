<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educa Pro | Trilhas de Estudo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --ifce: #2f9e41; }
        .bg-ifce { background-color: var(--ifce); }
        .text-ifce { color: var(--ifce); }
        .active-tab { border-bottom: 4px solid var(--ifce); color: var(--ifce); background: #f0fdf4; }

        /* ÁTOMO 3D DINÂMICO */
        .atom-wrapper { width: 50px; height: 50px; position: relative; perspective: 800px; display: flex; align-items: center; justify-content: center; }
        .nucleus { width: 12px; height: 12px; background: radial-gradient(circle, #ff6b6b, #cc0000); border-radius: 50%; position: absolute; box-shadow: 0 0 15px #ff4d4d; z-index: 10; }
        .orbit { position: absolute; width: 100%; height: 100%; border: 1.5px solid rgba(47, 158, 65, 0.4); border-radius: 50%; transform-style: preserve-3d; animation: rotate-orbit 3s linear infinite; }
        .orbit:nth-child(2) { transform: rotateX(70deg) rotateY(20deg); animation-duration: 2.5s; }
        .orbit:nth-child(3) { transform: rotateX(-70deg) rotateY(20deg); animation-duration: 4s; }
        .electron { width: 5px; height: 5px; background: var(--ifce); border-radius: 50%; position: absolute; top: 50%; box-shadow: 0 0 8px var(--ifce); }
        @keyframes rotate-orbit { from { transform: rotateX(70deg) rotateZ(0deg); } to { transform: rotateX(70deg) rotateZ(360deg); } }

        /* Animação suave para a trilha */
        .trilha-card { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden">

    <header class="bg-white p-4 border-b text-center">
        <h1 class="text-xl font-black italic tracking-tighter">EDUCA <span class="text-ifce">PRO</span></h1>
    </header>

    <nav class="bg-white border-b flex justify-around sticky top-0 z-30">
        <button onclick="renderTab('ia')" id="btn-ia" class="sidebar-item flex-1 py-4 flex flex-col items-center gap-1 font-bold text-[10px] uppercase">
            <i class="fas fa-atom text-lg"></i> IA Átomo
        </button>
        <button onclick="renderTab('edital')" id="btn-edital" class="sidebar-item flex-1 py-4 flex flex-col items-center gap-1 font-bold text-[10px] uppercase">
            <i class="fas fa-route text-lg"></i> Trilhas
        </button>
        <button onclick="renderTab('calc')" id="btn-calc" class="sidebar-item flex-1 py-4 flex flex-col items-center gap-1 font-bold text-[10px] uppercase">
            <i class="fas fa-calculator text-lg"></i> Notas
        </button>
    </nav>

    <main class="flex-1 overflow-hidden flex flex-col">
        <div id="app-viewport" class="flex-1 overflow-y-auto p-4 max-w-2xl mx-auto w-full h-full"></div>
    </main>

    <script>
        const API_KEY = "Gsk_F4poWgDj2lue56bdS5JvWGdyb3FY7mPqIy0tOeBgdilDA9h3RC8b";
        
        const EDITAL_AREAS = {
            "Língua Portuguesa": ["Interpretação de Texto", "Ortografia", "Sintaxe", "Concordância"],
            "Matemática": ["Razão e Proporção", "Equações", "Geometria Plana", "Porcentagem"]
        };

        let progresso = JSON.parse(localStorage.getItem('educapro_checklist')) || {};
        let chatHistory = JSON.parse(localStorage.getItem('educapro_chat')) || [];

        function renderTab(tab) {
            const v = document.getElementById('app-viewport');
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`btn-${tab}`).classList.add('active-tab');

            if(tab === 'edital') {
                v.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border">
                        <h2 class="font-black text-ifce mb-2">TRILHA DE APRENDIZAGEM</h2>
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-6">Selecione um tema para ver os passos de estudo</p>
                        
                        ${Object.keys(EDITAL_AREAS).map(area => `
                            <div class="mb-6">
                                <h3 class="text-[11px] font-black text-gray-500 mb-3 border-b pb-1 uppercase">${area}</h3>
                                <div class="grid gap-2">
                                    ${EDITAL_AREAS[area].map(item => `
                                        <div onclick="abrirTrilha('${item}')" class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-gray-100 cursor-pointer active:scale-95 transition-all">
                                            <div class="flex items-center gap-3">
                                                <input type="checkbox" onclick="event.stopPropagation(); toggleItem('${item}', this.checked)" ${progresso[item]?'checked':''} class="w-5 h-5 accent-green-600">
                                                <span class="text-sm font-bold text-gray-700">${item}</span>
                                            </div>
                                            <i class="fas fa-chevron-right text-gray-300"></i>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div id="trilha-detalhe"></div>
                </div>`;
            }

            if(tab === 'ia') {
                v.innerHTML = `
                <div class="flex flex-col h-full space-y-4">
                    <div class="bg-ifce p-5 rounded-3xl text-white flex items-center gap-4 shadow-lg">
                        <div class="atom-wrapper"><div class="nucleus"></div><div class="orbit"><div class="electron"></div></div><div class="orbit"><div class="electron"></div></div></div>
                        <div>
                            <h2 class="font-black text-lg leading-none">Professor Átomo</h2>
                            <p class="text-[9px] font-bold opacity-80 uppercase mt-1">Histórico Ativado</p>
                        </div>
                    </div>
                    <div class="flex-1 flex flex-col bg-white rounded-3xl shadow-sm border overflow-hidden min-h-[400px]">
                        <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-50/50 text-sm"></div>
                        <div class="p-3 bg-white border-t flex gap-2">
                            <input id="user-input" type="text" class="flex-1 p-4 bg-gray-100 rounded-2xl outline-none" placeholder="Tire sua dúvida...">
                            <button onclick="askAI()" class="bg-ifce text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-md"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>`;
                loadChat();
            }
            
            if(tab === 'calc') {
                v.innerHTML = `<div class="bg-white p-8 rounded-3xl shadow-sm border text-center">
                    <h2 class="font-black text-gray-700 mb-6 uppercase">Simulador de Média</h2>
                    <input id="p" type="number" placeholder="Português" class="w-full p-4 mb-3 bg-slate-50 rounded-2xl border text-center font-bold">
                    <input id="m" type="number" placeholder="Matemática" class="w-full p-4 mb-6 bg-slate-50 rounded-2xl border text-center font-bold">
                    <button onclick="calc()" class="w-full bg-ifce text-white py-4 rounded-2xl font-black shadow-lg">CALCULAR</button>
                    <div id="res" class="mt-6 text-6xl font-black text-ifce">--</div>
                </div>`;
            }
        }

        function abrirTrilha(item) {
            const detalhe = document.getElementById('trilha-detalhe');
            detalhe.scrollIntoView({behavior: 'smooth'});
            detalhe.innerHTML = `
                <div class="bg-white p-6 rounded-3xl border-2 border-ifce trilha-card shadow-xl">
                    <h3 class="font-black text-gray-800 mb-4 uppercase text-sm">Roteiro: ${item}</h3>
                    <div class="space-y-3">
                        <div class="p-3 bg-green-50 rounded-xl border border-green-100">
                            <b class="text-ifce text-[10px] uppercase">1. Teoria</b>
                            <p class="text-xs text-gray-600 mt-1">Assista a uma aula de base e faça um mapa mental dos conceitos principais.</p>
                        </div>
                        <div class="p-3 bg-blue-50 rounded-xl border border-blue-100">
                            <b class="text-blue-600 text-[10px] uppercase">2. Prática</b>
                            <p class="text-xs text-gray-600 mt-1">Resolva 10 questões do IFCE sobre este tema e analise os erros.</p>
                        </div>
                        <div class="p-3 bg-orange-50 rounded-xl border border-orange-100">
                            <b class="text-orange-600 text-[10px] uppercase">3. Reforço</b>
                            <p class="text-xs text-gray-600 mt-1">Explique o assunto em voz alta para o Professor Átomo para validar seu conhecimento.</p>
                        </div>
                    </div>
                    <button onclick="enviarParaIA('${item}')" class="w-full mt-4 bg-gray-800 text-white p-3 rounded-xl font-bold text-[10px] uppercase">Dúvida Rápida com Átomo</button>
                </div>`;
        }

        function enviarParaIA(item) {
            const msg = `Professor Átomo, pode me dar um resumo bem didático sobre ${item} focado no IFCE?`;
            renderTab('ia');
            document.getElementById('user-input').value = msg;
        }

        function loadChat() {
            const box = document.getElementById('chat-box');
            if(!box) return;
            box.innerHTML = chatHistory.length === 0 ? '<p class="text-center text-gray-300 text-[10px] mt-10">SEM MENSAGENS</p>' : '';
            chatHistory.forEach(msg => {
                const isUser = msg.role === 'user';
                box.innerHTML += `<div class="flex ${isUser ? 'justify-end' : 'justify-start'}">
                    <div class="${isUser ? 'bg-ifce text-white rounded-br-none' : 'bg-white border-l-4 border-ifce rounded-tl-none'} p-4 rounded-2xl shadow-sm max-w-[90%] text-sm font-medium">
                        ${msg.content}
                    </div>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        }

async function askAI() {
    const input = document.getElementById('user-input');
    const q = input.value.trim(); 
    if(!q) return;

    chatHistory.push({ role: 'user', content: q });
    input.value = ""; 
    loadChat();

    const box = document.getElementById('chat-box');
    const load = document.createElement('div');
    load.className = "bg-white p-4 rounded-2xl border animate-pulse text-[10px] font-black text-gray-400";
    load.innerText = "ÁTOMO PROCESSANDO...";
    box.appendChild(load);
    box.scrollTop = box.scrollHeight;

    try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { 
                "Content-Type": "application/json", 
                "Authorization": "Bearer Gsk_F4poWgDj2lue56bdS5JvWGdyb3FY7mPqIy0tOeBgdilDA9h3RC8b" 
            },
            body: JSON.stringify({ 
                model: "llama3-8b-8192", 
                messages: [
                    {role: "system", content: "Você é o Professor Átomo, tutor especializado no IFCE. Responda de forma didática."}, 
                    ...chatHistory.slice(-4)
                ] 
            })
        });

        if (!res.ok) throw new Error("Erro na API");

        const data = await res.json();
        load.remove();
        chatHistory.push({ role: 'assistant', content: data.choices[0].message.content });
        localStorage.setItem('educapro_chat', JSON.stringify(chatHistory));
        loadChat();
    } catch(e) { 
    load.innerText = "Erro Técnico: " + e.message; 
    }
    

        

        function toggleItem(item, status) {
            progresso[item] = status;
            localStorage.setItem('educapro_checklist', JSON.stringify(progresso));
        }

        function calc() {
            const p = Number(document.getElementById('p').value) * 2;
            const m = Number(document.getElementById('m').value) * 3;
            document.getElementById('res').innerText = ((p + m) / 5).toFixed(2);
        }

        window.onload = () => { renderTab('ia'); };
    </script>
</body>
</html>
